repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        args: [--style=file]
        files: \.(c|cc|cxx|cpp|h|hh|hxx|hpp)$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/ament/ament_lint
    rev: 0.17.1
    hooks:
      - id: ament_copyright
